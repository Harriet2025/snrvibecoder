<!-- ================= PAGE HEADER ================= -->
<section style="text-align:center; padding:30px;">
    <h1>Contact Us</h1>
    <p>Send us a message and we will get back to you.</p>
</section>

<!-- ================= CONTACT FORM ================= -->
<form id="contactForm" onsubmit="return validateContact()">

    <!-- Name -->
    <label>Full Name</label>
    <input type="text" id="contactName">
    <div class="error"></div>

    <!-- Email -->
    <label>Email</label>
    <input type="text" id="contactEmail">
    <div class="error"></div>

    <!-- Message -->
    <label>Message</label>
    <textarea id="contactMessage" rows="5"></textarea>
    <div class="error"></div>

    <br>
    <button type="submit">Send Message</button>

    <div id="contactSuccess" class="success"></div>

</form>

<!-- ================= CONTACT INFO ================= -->
<section style="text-align:center; padding:30px;">
    <h3>ATU Campus Address</h3>
    <p>Accra Technical University</p>
    <p>Accra, Ghana</p>
    <p>Email: info@atu.edu.gh</p>
    <p>Phone: +233 302 123 456</p>
</section>

<!-- ================= FOOTER ================= -->
<footer>
    <p>© 2026 Accra Technical University | Contact Office</p>
</footer>

<script src="js/main.js"></script>

</body>
